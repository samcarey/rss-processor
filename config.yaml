storage:
  base_path: ./data
  original: ./data/original
  processed: ./data/processed
  segments: ./data/segments
  fingerprints: ./data/fingerprints  # raw chromaprint .npy per episode
  transcripts: ./data/transcripts    # whisper full-JSON per episode
  database: ./data/rss-processor.db

web:
  host: 0.0.0.0
  port: 5002  # 5000 = macOS AirPlay, 5001 = bad-spaceship server
  # Served to the tailnet via `tailscale serve --bg --https=9444 http://127.0.0.1:5002`
  # (direct :5002 is blocked by the macOS application firewall for this python)
  base_url: https://mini4.tail350dd8.ts.net:9444

worker:
  check_interval_seconds: 1800  # 30 minutes
  backfill_days: 14

audio:
  max_workers: 2

transcription:
  model_path: ./data/models/ggml-small.en.bin  # whisper.cpp model
  threads: 6

# Ad detection tuning; defaults live in processor/ad_detector.py (DEFAULTS).
# Override any key here, e.g.:
#   max_pair_fraction: 0.35   # compilation-relationship exclusion
#   confirm_below_matches: 4  # low-evidence regions need transcript confirm
ad_detection: {}
